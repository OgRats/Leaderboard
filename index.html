<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OgRats Holders Leaderboard</title>
    <style>
        /* Estilos oscuros modernos estilo Web3 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #22c55e; /* Verde brillante 💚 */
            margin-bottom: 5px;
            text-align: center;
        }
        p {
            color: #94a3b8;
            margin-bottom: 25px;
            text-align: center;
        }
        .leaderboard-container {
            width: 100%;
            max-width: 600px;
            background-color: #111827;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #1f2937;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 14px 20px;
            border-bottom: 1px solid #1f2937;
        }
        th {
            background-color: #1f2937;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:hover {
            background-color: #1e293b;
        }
        .rank {
            font-weight: bold;
            color: #f59e0b;
            width: 50px;
        }
        .address {
            font-family: monospace;
            color: #38bdf8;
        }
        .balance {
            text-align: right;
            font-weight: bold;
            color: #22c55e;
        }
        th.text-right {
            text-align: right;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>🏆 OgRats Holders Leaderboard</h1>
    <p>1 Punto diario acumulado por cada OG Rat holdeada</p>

    <div class="leaderboard-container">
        <table>
            <thead>
                <tr>
                    <th class="rank">Pos</th>
                    <th>Billetera (Address)</th>
                    <th class="text-right">Puntos / Rats</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3" class="loading">Cargando holders desde Supabase...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // CONFIGURACIÓN OFICIAL DE TU PROYECTO
        const SUPABASE_URL = "https://bcclyutxzbbgvarypfwd.supabase.co";
        const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjY2x5dXR4emJiZ3ZhcnlwZndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTY1NDksImV4cCI6MjA5ODY3MjU0OX0.4DUTMdbttMB-Yk25qB5rUlLkV0DgKDWNcuuwjI2rK6E"; 

        async function cargarLeaderboard() {
            const tablaBody = document.getElementById('leaderboard-body');
            
            try {
                // Se añade un parámetro aleatorio al final (&v=...) para obligar al móvil a romper la caché vieja
                const url = `${SUPABASE_URL}/rest/v1/ograts_holders?select=address,balance,puntos&order=puntos.desc&v=${Date.now()}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const textoError = await response.text();
                    throw new Error(`Código ${response.status}: ${textoError}`);
                }

                const data = await response.json();
                tablaBody.innerHTML = ''; 

                if (data.length === 0) {
                    tablaBody.innerHTML = '<tr><td colspan="3" class="loading">No hay datos de holders guardados aún. Asegúrate de ejecutar el Action en GitHub.</td></tr>';
                    return;
                }

                // Dibujar las filas con el nuevo sistema de puntos diarios
                data.forEach((holder, index) => {
                    const fila = document.createElement('tr');
                    
                    const walletCorta = holder.address.substring(0, 6) + '...' + holder.address.substring(holder.address.length - 4);
                    const pts = holder.puntos || 0;
                    const rats = holder.balance || 0;

                    fila.innerHTML = `
                        <td class="rank">#${index + 1}</td>
                        <td class="address" title="${holder.address}">${walletCorta}</td>
                        <td class="balance">${pts} Pts <span style="font-size:0.8rem; color:#94a3b8; font-weight:normal;">(${rats} Rats)</span></td>
                    `;
                    tablaBody.appendChild(fila);
                });

            } catch (error) {
                console.error(error);
                // Si algo falla internamente, el celular mostrará el motivo en letras rojas aquí mismo
                tablaBody.innerHTML = `<tr><td colspan="3" class="loading" style="color: #ef4444; padding: 20px;">❌ Error: ${error.message}</td></tr>`;
            }
        }

        cargarLeaderboard();
    </script>
</body>
</html>
